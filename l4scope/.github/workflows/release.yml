name: Release

# Cuts a GitHub Release from a `vX.Y.Z` tag: builds static binaries for
# Linux/macOS/Windows, packages them alongside the sample config, publishes
# a GitHub Release with the artifacts attached, and pushes a container image
# to GHCR. See .claude/agents/release.md for the interactive release flow
# (version bump + tag) that triggers this workflow.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build a release for"
        required: true

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: l4scope

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: l4scope
          key: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Default (std-only) build: no eBPF/ETW, so no extra OS toolchains are
      # needed here — matches the "always green on every platform" default
      # build described in Cargo.toml / docs/BUILD_NATIVE.md.
      - name: Build release binary
        working-directory: l4scope
        run: cargo build --release -p l4scope-agent --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        working-directory: l4scope
        run: |
          STAGE="$BIN_NAME-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/$BIN_NAME" "$STAGE/"
          cp README.md "$STAGE/"
          cp -r config "$STAGE/"
          tar -czf "$STAGE.tar.gz" "$STAGE"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        working-directory: l4scope
        shell: bash
        run: |
          STAGE="$BIN_NAME-${{ matrix.target }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/$BIN_NAME.exe" "$STAGE/"
          cp README.md "$STAGE/"
          cp -r config "$STAGE/"
          7z a "$STAGE.zip" "$STAGE"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: l4scope/${{ env.BIN_NAME }}-${{ matrix.target }}.${{ matrix.archive }}
          if-no-files-found: error

  docker:
    name: docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: l4scope
          file: l4scope/deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ghcr.io/${{ github.repository }}:latest

  release:
    name: publish GitHub release
    needs: [build, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: artifacts/*
          generate_release_notes: true
